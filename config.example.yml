# yaml-language-server: $schema=./config.schema.json
mode: "Transform" # Transform / CaptureAnthropic / CaptureResponse

log:
  level: "info"  # debug / info / warn / error
  format: "text" # text / json

server:
  addr: "127.0.0.1:38440"
  # auth_token: "replace-with-your-secret-token"

persistence:
  active_provider: db_sqlite

extensions:
  deepseek_v4:
    config:
      reinforce_instructions: true
      reinforce_prompt: "[System Reminder]: Please pay close attention to the system
        instructions, AGENTS.md files, and any other context provided. Follow them
        carefully and completely in your response.\n[User]:"
  visual:
    config:
      provider: "kimi"
      model: "kimi-for-coding"
      max_rounds: 4
      max_tokens: 2048
  kimi_workaround:
    config:
      max_tool_rounds: 50
      convergence_margin: 0.8
  db_sqlite:
    enabled: true
    config:
      path: ./data/moonbridge.db
      wal: true
      busy_timeout_ms: 5000
      max_open_conns: 1
  metrics:
    enabled: true
    config:
      default_limit: 100
      max_limit: 1000

cache:
  mode: "explicit"
  ttl: "5m"
  prompt_caching: true
  automatic_prompt_cache: false
  explicit_cache_breakpoints: true
  allow_retention_downgrade: false
  max_breakpoints: 4
  min_cache_tokens: 1024
  expected_reuse: 2
  minimum_value_score: 2048
  min_breakpoint_tokens: 1024

defaults:
  model: "moonbridge"
  max_tokens: 65536

trace:
  enabled: false
proxy:
  response:
    base_url: "https://api.openai.com"
    api_key: "replace-with-real-openai-responses-api-key"
    model: "gpt-5.4"
  anthropic:
    base_url: "https://provider.example.com"
    api_key: "replace-with-real-anthropic-compatible-api-key"
    version: "2023-06-01"
models:
  deepseek-v4-pro:
    context_window: 1000000
    max_output_tokens: 384000
    display_name: "DeepSeek V4 Pro"
    description: "DeepSeek V4 with selectable high/xhigh reasoning effort."
    default_reasoning_level: "high"
    supported_reasoning_levels:
      - effort: "high"
        description: "High reasoning effort"
      - effort: "xhigh"
        description: "Extra high reasoning effort (maps to DeepSeek max)"
    supports_reasoning_summaries: true
    default_reasoning_summary: "auto"
    web_search:
      support: "auto"
    extensions:
      deepseek_v4:
        enabled: true
      visual:
        enabled: true
  deepseek-v4-flash:
    context_window: 1000000
    max_output_tokens: 384000
    display_name: "DeepSeek V4 Flash"
    description: "DeepSeek V4 Flash with selectable high/xhigh reasoning effort."
    default_reasoning_level: "high"
    supported_reasoning_levels:
      - effort: "high"
        description: "High reasoning effort"
      - effort: "xhigh"
        description: "Extra high reasoning effort (maps to DeepSeek max)"
    supports_reasoning_summaries: true
    default_reasoning_summary: "auto"
    web_search:
      support: "auto"
    extensions:
      deepseek_v4:
        enabled: true
      visual:
        enabled: true
  kimi-for-coding:
    context_window: 128000
    input_modalities:
      - "text"
      - "image"
  gpt-image-1.5: {}
  gpt-4o-mini-tts: {}
  glm-5.1:
    context_window: 204800
    max_output_tokens: 131072
    display_name: "GLM-5.1"
    description: "智谱 GLM-5.1 编码模型，支持推理与工具调用。"
    default_reasoning_level: "medium"
    supported_reasoning_levels:
      - effort: "low"
        description: "快速响应，轻量推理"
      - effort: "medium"
        description: "平衡速度与推理深度"
      - effort: "high"
        description: "深度推理，适合复杂任务"
    supports_reasoning_summaries: true
    default_reasoning_summary: "auto"
    input_modalities:
      - "text"
    web_search:
      support: "disabled"
  minimax-m2.7:
    context_window: 204800
    max_output_tokens: 131072
    display_name: "MiniMax M2.7"
    description: "MiniMax M2.7 编码与 Agent 模型，支持推理与工具调用。"
    default_reasoning_level: "medium"
    supported_reasoning_levels:
      - effort: "low"
        description: "快速响应，轻量推理"
      - effort: "medium"
        description: "平衡速度与推理深度"
      - effort: "high"
        description: "深度推理，适合复杂任务"
    supports_reasoning_summaries: true
    default_reasoning_summary: "auto"
    input_modalities:
      - "text"
    web_search:
      support: "disabled"
  claude-sonnet-4-20250514:
    context_window: 200000
    max_output_tokens: 64000
    display_name: "Claude Sonnet 4"
    description: "Frontier model for everyday coding."
    default_reasoning_level: "medium"
    supported_reasoning_levels:
      - effort: "low"
        description: "Fast responses with lighter reasoning"
      - effort: "medium"
        description: "Balances speed and reasoning depth for everyday tasks"
      - effort: "high"
        description: "Greater reasoning depth for complex problems"
      - effort: "xhigh"
        description: "Extra high reasoning depth for complex problems"
          # Declare this model as multimodal (supports image input).
          # Codex reads these from models_catalog.json to decide whether
          # image attachments can be included in user turns.
    input_modalities:
      - "text"
      - "image"
    supports_image_detail_original: true

providers:
  deepseek:
    base_url: "https://api.deepseek.com/anthropic"
    api_key: "replace-with-deepseek-api-key"
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    web_search:
      support: "auto"
    offers:
      - model: deepseek-v4-pro
        pricing:
          input_price: 2
          output_price: 8
          cache_write_price: 1
          cache_read_price: 0.2
      - model: deepseek-v4-flash
        pricing:
          input_price: 1
          output_price: 2
          cache_write_price: 1
          cache_read_price: 0.02
  kimi:
      # Anthropic-compatible base URL for Kimi/Moonshot.
    base_url: "https://api.kimi.com/coding/"
    api_key: "replace-with-kimi-api-key"
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    offers:
      - model: kimi-for-coding
  zhipu:
    # 智谱 AI Anthropic 兼容接口
    base_url: "https://open.bigmodel.cn/api/anthropic"
    api_key: "replace-with-zhipu-api-key"
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    web_search:
      support: "disabled"
    offers:
      - model: glm-5.1
        upstream_name: "GLM-5.1"
  minimax:
    # MiniMax Anthropic 兼容接口
    base_url: "https://api.minimaxi.com/anthropic"
    api_key: "replace-with-minimax-api-key"
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    web_search:
      support: "disabled"
    offers:
      - model: minimax-m2.7
        upstream_name: "minimax-m2.7"
  openai:
    base_url: "https://api.openai.com"
    api_key: "replace-with-openai-api-key"
    protocol: "openai-response"
    user_agent: "moonbridge/1.0"
    offers:
      - model: gpt-image-1.5
      - model: gpt-4o-mini-tts
  anthropic:
    base_url: "https://api.anthropic.com"
    api_key: "replace-with-anthropic-api-key"
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    web_search:
      support: "enabled"
    offers:
      - model: claude-sonnet-4-20250514
        pricing:
          input_price: 3
          output_price: 15
          cache_write_price: 3.75
          cache_read_price: 0.30

routes:
  moonbridge:
    model: glm-5.1
    provider: zhipu
  # 可选：Flash 别名，Codex 里选 deepseek-flash 即走 Flash
  gpt-5.4:
    model: minimax-m2.7
    provider: minimax
  gpt-5.4-Mini:
    model: minimax-m2.7
    provider: minimax
  gpt-5.5:
    model: glm-5.1
    provider: zhipu
  deepseek-flash:
    model: deepseek-v4-flash
    provider: deepseek
  glm-5.1:
    model: glm-5.1
    provider: zhipu
  minimax-m2.7:
    model: minimax-m2.7
    provider: minimax
  gpt-image:
    model: gpt-image-1.5
    provider: openai
  gpt-tts:
    model: gpt-4o-mini-tts
    provider: openai
